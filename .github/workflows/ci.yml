name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          bun install --frozen-lockfile
      - name: Build and test
        run: bun run check
      - name: Installer smoke test
        shell: powershell
        run: .\install.ps1
      - name: Start and health smoke test
        shell: powershell
        run: |
          $process = Start-Process powershell -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "$pwd\run.ps1") -WorkingDirectory $pwd -PassThru -WindowStyle Hidden
          try {
            $expectedVersion = (Get-Content -LiteralPath .\VERSION -Raw).Trim()
            $healthy = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8001/api/health" -TimeoutSec 2
                if ($health.rag_service -eq "ok" -and $health.software_version -eq $expectedVersion) { $healthy = $true; break }
              } catch {}
              Start-Sleep -Seconds 1
            }
            if (-not $healthy) { throw "CrabRAG health smoke test failed" }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            $listeners = Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue | Where-Object { $_.LocalPort -in @(3003, 8001) }
            foreach ($processId in ($listeners.OwningProcess | Sort-Object -Unique)) {
              Stop-Process -Id $processId -Force -ErrorAction SilentlyContinue
            }
          }
      - name: Validate release package
        shell: powershell
        run: .\scripts\build_release.ps1 -Version 1.1.0 -OutputDir "$env:RUNNER_TEMP\crabrag-release"

  ubuntu-python-310:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          bun install --frozen-lockfile
      - name: Shell syntax
        run: bash -n install.sh run.sh
      - name: Installer smoke test
        run: ./install.sh
      - name: Build
        run: bun run build
      - name: Core tests
        run: >-
          ./.venv/bin/python -m pytest -q
          tests/test_document_manifest.py
          tests/test_index_generation.py
          tests/test_security_governance.py
          tests/test_admin_tools.py
