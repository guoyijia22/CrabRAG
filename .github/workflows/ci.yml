name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          bun install --frozen-lockfile
      - name: Build and test
        run: bun run check
      - name: Build release package
        shell: powershell
        run: |
          $version = (Get-Content -LiteralPath .\VERSION -Raw).Trim()
          .\scripts\build_release.ps1 -Version $version -OutputDir "$env:RUNNER_TEMP\crabrag-release"
      - name: Release install, dependency, start, health, and stop smoke
        shell: powershell
        run: |
          $version = (Get-Content -LiteralPath .\VERSION -Raw).Trim()
          $archive = "$env:RUNNER_TEMP\crabrag-release\CrabRAG-v$version-windows-x64.zip"
          $extractRoot = "$env:RUNNER_TEMP\crabrag-installed"
          Expand-Archive -LiteralPath $archive -DestinationPath $extractRoot
          $releaseRoot = Join-Path $extractRoot "CrabRAG"
          $process = $null
          Push-Location $releaseRoot
          try {
            .\install.ps1
            bun -e "await import('@huggingface/transformers'); console.log('transformers-ok')"
            $process = Start-Process powershell -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "$releaseRoot\run.ps1") -WorkingDirectory $releaseRoot -PassThru -WindowStyle Hidden
            $expectedVersion = (Get-Content -LiteralPath .\VERSION -Raw).Trim()
            $healthy = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8001/api/health" -TimeoutSec 2
                if ($health.rag_service -eq "ok" -and $health.software_version -eq $expectedVersion) { $healthy = $true; break }
              } catch {}
              Start-Sleep -Seconds 1
            }
            if (-not $healthy) { throw "CrabRAG health smoke test failed" }
            $stop = Start-Process -FilePath .\stop.bat -WorkingDirectory $releaseRoot -Wait -PassThru -WindowStyle Hidden
            if ($stop.ExitCode -ne 0) { throw "CrabRAG stop smoke test failed" }
            $process.WaitForExit(10000) | Out-Null
            Start-Sleep -Seconds 1
            $listeners = Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue | Where-Object { $_.LocalPort -in @(3003, 8001) }
            if ($listeners -or (Test-Path -LiteralPath .\data\run.json)) { throw "CrabRAG release left runtime state behind" }
          } finally {
            if ($null -ne $process) { Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 2
            $listeners = Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue | Where-Object { $_.LocalPort -in @(3003, 8001) }
            foreach ($processId in ($listeners.OwningProcess | Sort-Object -Unique)) {
              Stop-Process -Id $processId -Force -ErrorAction SilentlyContinue
            }
            Pop-Location
          }

  ubuntu-python-310:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          bun install --frozen-lockfile
      - name: Shell syntax
        run: bash -n install.sh run.sh
      - name: Installer smoke test
        run: bash ./install.sh
      - name: Runner invocation smoke test
        run: bash ./run.sh --help
      - name: Build
        run: bun run build
      - name: Core tests
        run: >-
          python -m pytest -q
          tests/test_document_manifest.py
          tests/test_index_generation.py
          tests/test_security_governance.py
          tests/test_identity_provider.py
          tests/test_enterprise_permissions.py
          tests/test_security_audit.py
          tests/test_secret_storage.py
          tests/test_admin_tools.py
